name: Bug Report
description: Something is broken or behaving incorrectly
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: mediaforge version
      placeholder: "e.g. 0.0.1"
    validations:
      required: true

  - type: input
    id: ffmpeg-version
    attributes:
      label: FFmpeg version
      description: Output of `ffmpeg -version | head -1`
      placeholder: "e.g. ffmpeg version 7.1.1"
    validations:
      required: true

  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options:
        - Node.js 20
        - Node.js 22
        - Deno 2.x
        - Bun
        - Other
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g. Ubuntu 24.04 ARM64, macOS 14, Windows 11, Android Termux"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal Reproduction
      description: The smallest possible code that reproduces the issue.
      render: typescript
      placeholder: |
        import { ffmpeg } from 'mediaforge';
        // ...
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error Output
      description: Full error message, stack trace, or FFmpeg stderr output.
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, logs, or screenshots that might help.
