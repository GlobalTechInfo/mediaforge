name: Publish to npm

# Triggered automatically when Build & Release completes successfully on a tag.
# workflow_run is used because GitHub blocks release events created by GITHUB_TOKEN
# from triggering other workflows.
on:
  workflow_run:
    workflows: ["Build & Release"]
    types: [completed]
  workflow_dispatch:

jobs:
  publish:
    # Only run when upstream succeeded (or when triggered manually)
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade NPM
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build (ESM + CJS)
        run: npm run build

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ""
