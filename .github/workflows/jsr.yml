name: Publish to JSR

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish-jsr:
    name: Publish to JSR
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install FFmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg

      - name: Type check (lib/ only)
        run: deno task check

      - name: Lint
        run: deno lint

      - name: Run tests
        run: deno task test
        continue-on-error: true

      - name: Dry run publish
        run: deno publish --dry-run

      - name: Publish to JSR
        run: deno publish --allow-dirty
